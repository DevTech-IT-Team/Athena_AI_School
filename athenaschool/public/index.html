<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Critical CSS inlined to prevent render-blocking -->
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; line-height: 1.5; }
    .hero-section { min-height: 100vh; background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); display: flex; align-items: center; justify-content: center; }
    .hero-content { text-align: center; max-width: 1200px; padding: 2rem; }
    .hero-title { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; color: #1e3a8a; margin-bottom: 1rem; }
    .hero-subtitle { font-size: clamp(1rem, 3vw, 1.5rem); color: #3b82f6; margin-bottom: 2rem; }
    .hero-image { max-width: 100%; height: auto; margin: 2rem 0; }
    .loading-fallback { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); }
    .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-text { height: 1.2em; margin: 0.5em 0; border-radius: 0.25em; width: 60%; }
    .skeleton-title { height: 2em; width: 80%; margin-bottom: 1em; }
  </style>
  
  <!-- Resource Hints for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//lucide.dev">
  
  <title>Athena AI Online School</title>
  <meta name="description" content="Personalized online schooling designed for the modern learner. Experience education tailored to your child's unique needs, interests, and learning style." />
  
  <!-- Preload critical resources -->
  <link rel="preload" href="/src/assets/gemini.webp%20(2).webp" as="image" fetchpriority="high">
  <link rel="modulepreload" href="/src/main.jsx">
  
  <!-- Critical JavaScript for performance optimization -->
  <script>
    // Critical inline JavaScript to prevent render-blocking
    (function() {
      // Optimize font loading
      if ('fonts' in document) {
        Promise.all([
          document.fonts.load('400 1em -apple-system'),
          document.fonts.load('600 1em -apple-system'),
          document.fonts.load('800 1em -apple-system')
        ]).then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      }
      
      // Preload critical resources when idle
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          const resources = [
            '/src/components/Stats.jsx',
            '/src/components/Features.jsx'
          ];
          
          resources.forEach(resource => {
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = resource;
            document.head.appendChild(link);
          });
        });
      }
    })();
  </script>
</head>

<body>
  <div id="root">
    <div class="hero-section">
      <div class="hero-content">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width: 40%;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
